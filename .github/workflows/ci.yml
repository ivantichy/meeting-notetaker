name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        # soundcard a faster_whisper jsou v testech mockované (tests/conftest.py),
        # takže nativní/těžké balíky tu nejsou potřeba — testy běží i na Linuxu.
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy requests icalendar recurring-ical-events python-dateutil tzdata PyYAML
      - name: Run tests
        run: python -m pytest -q

  windows-import:
    name: Import smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install GUI + import dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 numpy requests icalendar recurring-ical-events python-dateutil tzdata
      - name: Import UI modules (offscreen)
        # Ověří, že se GUI moduly (app.ui.*) importují bez chyby — žádný test je
        # jinak neimportuje. soundcard/faster_whisper se načítají líně, takže
        # je tu nepotřebujeme.
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import app.ui.main_window, app.ui.call_panel, app.ui.theme, app.ui.onboarding, app.main; print('UI import OK')"
