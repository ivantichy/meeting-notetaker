name: Release

# Build the per-user Windows installer and publish it as a GitHub Release.
# Trigger by pushing a version tag, e.g.:  git tag v0.2.0 && git push origin v0.2.0
# workflow_dispatch also builds the installer (uploaded as an artifact only — a
# Release is published just for tag pushes).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # plná historie + anotace tagů (popisek releasu z tag message)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build onedir bundle (PyInstaller)
        shell: pwsh
        run: |
          # Build from the repo root: the spec resolves its own paths via SPECPATH,
          # so the default distpath (.\dist) lands where the Inno Setup script
          # expects it. PYTHONPATH makes the `app` package importable during
          # analysis. No makespec-only flags here (e.g. --paths) — PyInstaller
          # rejects those when building from a .spec file.
          $env:PYTHONPATH = (Resolve-Path .).Path
          pyinstaller --noconfirm --clean packaging\windows\MeetingNotetaker.spec
          if (-not (Test-Path "dist\MeetingNotetaker\MeetingNotetaker.exe")) {
            throw "PyInstaller build is missing dist\MeetingNotetaker\MeetingNotetaker.exe"
          }

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          # Verze installeru z gitového tagu (v0.3.1 -> 0.3.1); jinak dev placeholder.
          $ver = "0.0.0-dev"
          if ($env:GITHUB_REF_NAME -match '^v(\d.*)$') { $ver = $Matches[1] }
          Write-Host "Building installer version $ver"
          & $iscc "/DMyAppVersion=$ver" "packaging\windows\meeting-notetaker.iss"
          $setup = "packaging\windows\Output\MeetingNotetaker-Setup.exe"
          if (-not (Test-Path $setup)) { throw "Installer not produced: $setup" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingNotetaker-Setup
          path: packaging/windows/Output/MeetingNotetaker-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          # Popis releasu = zpráva anotovaného tagu (každý release má popisek).
          $notes = (git tag -l --format='%(contents)' $tag | Out-String).Trim()
          if (-not $notes) { $notes = "Meeting Notetaker $tag" }
          gh release create "$tag" `
            "packaging/windows/Output/MeetingNotetaker-Setup.exe" `
            --title "$tag" `
            --notes "$notes"
