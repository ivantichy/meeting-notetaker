name: Release

# Build the per-user Windows installer and publish it as a GitHub Release.
# Trigger by pushing a version tag, e.g.:  git tag v0.2.0 && git push origin v0.2.0
# workflow_dispatch also builds the installer (uploaded as an artifact only — a
# Release is published just for tag pushes).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build onedir bundle (PyInstaller)
        shell: pwsh
        run: |
          $root = (Resolve-Path .).Path
          $env:PYTHONPATH = $root
          Push-Location packaging/windows
          pyinstaller --noconfirm --clean --paths "$root" `
            --distpath "$root\dist" --workpath "$root\build" `
            MeetingNotetaker.spec
          Pop-Location
          if (-not (Test-Path "$root\dist\MeetingNotetaker\MeetingNotetaker.exe")) {
            throw "PyInstaller build is missing dist\MeetingNotetaker\MeetingNotetaker.exe"
          }

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "packaging\windows\meeting-notetaker.iss"
          $setup = "packaging\windows\Output\MeetingNotetaker-Setup.exe"
          if (-not (Test-Path $setup)) { throw "Installer not produced: $setup" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingNotetaker-Setup
          path: packaging/windows/Output/MeetingNotetaker-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            "packaging/windows/Output/MeetingNotetaker-Setup.exe" `
            --title "$env:GITHUB_REF_NAME" `
            --generate-notes
